steps:
  - id: Install
    name: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    entrypoint: uv
    args: [sync, --frozen]

  - id: Test
    name: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    entrypoint: uv
    args: [run, pytest]

  - id: Build
    name: gcr.io/cloud-builders/docker
    args: [build, -t, "${_IMAGE}:$COMMIT_SHA", .]

  - id: Push
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:$COMMIT_SHA"]

  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pe-a-atl1
      - --image=${_IMAGE}:$COMMIT_SHA
      - --region=europe-west6
      - --platform=managed
      - --port=8000
      - --min-instances=0
      - --max-instances=1
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
substitutions:
  _IMAGE: europe-west6-docker.pkg.dev/he24-blog-dominique/pe-a-atl1/pe-a-atl1
